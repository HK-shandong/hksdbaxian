<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《八仙！》・旅行人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2C5F8A;
            --gold: #C8A972;
            --gold-deep: #B88943;
            --bg-main: #F8F4ED;
            --bg-card: #FFFFFF;
            --text-main: #2A2F38;
            --text-sub: #646E7D;
            --text-light: #9099A6;
            --border: rgba(44, 95, 138, 0.08);
        }

        body {
            background: var(--bg-main);
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(200, 169, 114, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(44, 95, 138, 0.08) 0%, transparent 50%);
            min-height: 100vh;
            font-family: 'STSong', 'SimSun', 'PingFang SC', 'Microsoft YaHei', serif;
            color: var(--text-main);
            line-height: 1.6;
            padding: 30px 16px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 720px;
            background: var(--bg-card);
            border-radius: 32px;
            padding: 40px 36px 44px;
            box-shadow: 0 8px 32px rgba(44, 95, 138, 0.08);
            border: 1px solid rgba(200, 169, 114, 0.15);
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, var(--primary), var(--gold), var(--primary));
            border-radius: 32px 32px 0 0;
            opacity: 0.8;
        }

        .test-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--primary) 20%, var(--gold-deep) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.4;
        }

        .test-sub {
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 0.25em;
            color: var(--text-sub);
            font-weight: 400;
        }

        .designer {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-light);
            letter-spacing: 0.1em;
            margin-top: 6px;
        }

        .divider-light {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 16px auto;
            opacity: 0.6;
        }

        /* 欢迎页 */
        .welcome {
            text-align: center;
            padding: 24px 0 16px;
        }

        .welcome .icon-big {
            font-size: 3.6rem;
            margin-bottom: 8px;
            display: block;
        }

        .welcome p {
            color: var(--text-sub);
            font-size: 0.98rem;
            max-width: 420px;
            margin: 14px auto 28px;
            line-height: 1.8;
        }

        .btn-start {
            background: linear-gradient(135deg, var(--primary), #3A76A8);
            border: none;
            color: #fff;
            padding: 14px 56px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 6px 20px rgba(44, 95, 138, 0.25);
            transition: transform 0.2s ease;
        }

        .btn-start:hover {
            transform: translateY(-2px);
        }

        /* 答题页 */
        .quiz-area {
            display: none;
        }

        .progress-wrap {
            margin: 28px 0 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(44, 95, 138, 0.08);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--gold));
            transition: width 0.4s ease;
            border-radius: 4px;
        }

        .progress-text {
            font-size: 0.72rem;
            color: var(--text-sub);
            white-space: nowrap;
            font-weight: 500;
        }

        .question-card {
            display: none;
            animation: fadeInUp 0.4s ease;
        }

        .question-card.active {
            display: block;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .q-number {
            font-size: 0.72rem;
            color: var(--primary);
            letter-spacing: 0.12em;
            font-weight: 600;
        }

        .q-text {
            font-size: 1.25rem;
            font-weight: 500;
            margin: 8px 0 22px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }

        .option-item {
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 20px;
            color: var(--text-main);
            font-size: 0.95rem;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            transition: all 0.25s ease;
        }

        .option-item:hover {
            border-color: rgba(44, 95, 138, 0.2);
            transform: translateY(-1px);
        }

        .option-item.selected {
            border-color: var(--primary);
            background: rgba(44, 95, 138, 0.06);
            color: var(--primary);
            font-weight: 500;
        }

        /* 答题操作栏 */
        .quiz-actions {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-quiz {
            background: #fff;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.88rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .btn-quiz:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-quiz:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-quiz.primary {
            background: linear-gradient(135deg, var(--primary), #3A76A8);
            border-color: var(--primary);
            color: #fff;
        }

        .btn-quiz.primary:hover:not(:disabled) {
            box-shadow: 0 4px 12px rgba(44, 95, 138, 0.2);
            color: #fff;
        }

        /* 结果页 */
        .result-wrap {
            display: none;
            animation: fadeInUp 0.5s ease;
        }

        .result-wrap.show {
            display: block;
        }

        .result-card {
            background: var(--bg-main);
            border-radius: 24px;
            padding: 32px 24px 24px;
            border: 1px solid rgba(200, 169, 114, 0.2);
            text-align: center;
            margin-bottom: 20px;
        }

        .result-main-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .result-sub-title {
            font-size: 0.85rem;
            color: var(--text-sub);
            letter-spacing: 0.12em;
            margin-bottom: 24px;
        }

        .avatar {
            width: 160px;
            height: 200px;
            border-radius: 16px;
            background: #fff;
            border: 1px solid rgba(200, 169, 114, 0.25);
            margin: 0 auto 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(44, 95, 138, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .result-name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-top: 12px;
        }

        .result-type {
            font-size: 0.82rem;
            color: var(--gold-deep);
            background: rgba(200, 169, 114, 0.12);
            padding: 4px 20px;
            border-radius: 40px;
            display: inline-block;
            margin: 8px 0 18px;
            font-weight: 500;
        }

        .result-desc {
            font-size: 0.95rem;
            color: var(--text-sub);
            padding: 16px 18px;
            background: #fff;
            border-radius: 16px;
            border-left: 3px solid var(--gold);
            text-align: left;
            margin-bottom: 20px;
            line-height: 1.7;
        }

        .route-preview {
            text-align: left;
            font-size: 0.9rem;
            color: var(--text-sub);
            background: #fff;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 16px;
            line-height: 1.8;
        }

        .route-preview strong {
            color: var(--primary);
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
        }

        .tip-box {
            font-size: 0.9rem;
            color: var(--text-sub);
            padding: 14px 18px;
            background: #fff;
            border-radius: 16px;
            border-right: 3px solid var(--gold);
            text-align: left;
            line-height: 1.7;
        }

        .tip-box strong {
            color: var(--primary);
            font-weight: 600;
            display: block;
            margin-bottom: 4px;
        }

        .share-footer {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px dashed var(--border);
            text-align: center;
        }

        .share-top-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .share-footer .share-tip {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin: 0;
        }

        .btn-share {
            background: linear-gradient(135deg, var(--primary), #3A76A8);
            border: none;
            color: #fff;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.88rem;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-reset-footer {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-sub);
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.88rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .btn-reset-footer:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 海报弹窗 */
        .poster-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .poster-modal.show {
            display: flex;
        }

        .poster-content {
            max-width: 360px;
            width: 100%;
            position: relative;
        }

        .poster-content img {
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .poster-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: #fff;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .poster-tip {
            text-align: center;
            color: #fff;
            font-size: 0.85rem;
            margin-top: 16px;
            opacity: 0.9;
        }

        .text-center {
            text-align: center;
        }

        @media (max-width: 600px) {
            .container { padding: 28px 20px 32px; border-radius: 24px; }
            .test-title { font-size: 1.5rem; }
            .q-text { font-size: 1.1rem; }
            .avatar { width: 140px; height: 180px; }
            .result-name { font-size: 1.6rem; }
            .btn-quiz { padding: 10px 16px; font-size: 0.82rem; }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <div class="test-title">《八仙！》・旅行人格测试</div>
        <div class="designer">好客山东 出品</div>
        <div class="divider-light"></div>

        <!-- 欢迎页 -->
        <div id="welcome" class="welcome">
            <span class="icon-big">🏔️</span>
            <p>八道旅途选择题，解锁你的专属八仙身份<br/>遇见齐鲁山海，遇见另一个自己</p>
            <button id="startBtn" class="btn-start">开启测试</button>
        </div>

        <!-- 答题页 -->
        <div id="quizArea" class="quiz-area">
            <div class="progress-wrap">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <span id="progressText" class="progress-text">1 / 8</span>
            </div>
            <div id="questionContainer"></div>
            <div class="quiz-actions">
                <button id="prevBtn" class="btn-quiz" disabled>上一题</button>
                <button id="resetOptionBtn" class="btn-quiz">重新选择</button>
                <button id="nextBtn" class="btn-quiz primary">下一题</button>
            </div>
        </div>

        <!-- 结果页 -->
        <div id="resultArea" class="result-wrap">
            <div id="resultContent"></div>

            <div class="share-footer">
                <div class="share-top-row">
                    <p class="share-tip">分享你的神仙人格</p>
                    <button id="posterBtn" class="btn-share">生成分享海报</button>
                </div>
                <button id="resetBtn" class="btn-reset-footer">重新测试</button>
            </div>
        </div>
    </div>

    <!-- 海报弹窗 -->
    <div id="posterModal" class="poster-modal">
        <div class="poster-content">
            <button id="posterClose" class="poster-close">×</button>
            <img id="posterImg" alt="分享海报">
            <div class="poster-tip">长按图片保存到手机，即可分享到微信</div>
        </div>
    </div>

                name: '张果老',
                type: '沉稳型旅行家',
                desc: '老谋深算，看尽世态。不慌不忙，总能发现别人忽略的风景与细节。',
                route: '「河海交汇·东营湿地慢行」2日行\nDay 1：黄河口生态旅游区，看黄蓝交汇奇观，漫步湿地木栈道观鸟\nDay 2：东营孤东海堤，看海上钻井平台与落日，逛红光渔港尝鲜',
                tip: '适合慢节奏、重体验的你。在黄河入海口见证河海相拥的旷世奇观，在孤东海堤静待一场壮阔的海上落日，不紧不慢间，把渤海湾的苍茫与温柔都收进眼底。',
                image: 'https://s41.ax1x.com/2026/07/20/pm6nHiR.jpg'
            }
        };

        const QUESTIONS = [
            {
                id: 1,
                text: '旅行出发前，你通常会？',
                options: ['做好详细攻略，订好所有机酒，精确到每小时', '大概看一眼目的地，订个住宿就出发，其他随缘', '先问问去过的朋友有什么推荐，再自己做功课', '完全不做计划，说走就走'],
                mapping: ['吕洞宾', '蓝采和', '何仙姑', '钟离权']
            },
            {
                id: 2,
                text: '旅行途中遇到突发状况，你第一反应是？',
                options: ['立刻搜索替代方案，重新规划路线', '原地吐槽三分钟，然后随遇而安', '冷静分析情况，按优先级处理问题', '觉得超刺激，干脆换个方向探索未知'],
                mapping: ['铁拐李', '张果老', '曹国舅', '韩湘子']
            },
            {
                id: 3,
                text: '在团队旅行中，你通常扮演什么角色？',
                options: ['带头大哥/大姐，负责决策和带路', '气氛担当，讲段子、活跃气氛全靠我', '靠谱后勤，管钱管票管时间', '佛系跟班，你们去哪我去哪'],
                mapping: ['吕洞宾', '钟离权', '曹国舅', '蓝采和']
            },
            {
                id: 4,
                text: '选择旅行目的地时，你更看重？',
                options: ['文化底蕴和历史厚重感', '网红打卡点和出片率', '小众独特、别人没去过的地方', '好吃好喝、人间烟火气'],
                mapping: ['张果老', '何仙姑', '韩湘子', '铁拐李']
            },
            {
                id: 5,
                text: '旅行中你最喜欢的体验是？',
                options: ['爬上山巅俯瞰全景，成就感拉满', '混进当地市集，跟摊主讨价还价', '找一家咖啡馆或茶馆，发呆看风景', '体验新奇项目'],
                mapping: ['吕洞宾', '铁拐李', '蓝采和', '钟离权']
            },
            {
                id: 6,
                text: '发旅行朋友圈时，你的风格是？',
                options: ['九宫格精修大片+文艺文案', '只发风景不发人，神秘感拉满', '连发三天vlog，事无巨细全记录', '随便发两张，懒得配文字'],
                mapping: ['何仙姑', '张果老', '韩湘子', '铁拐李']
            },
            {
                id: 7,
                text: '旅行中最不能忍受的事情是？',
                options: ['同伴不守时、打乱计划', '景区人挤人、排队两小时', '住宿条件太差、睡不好觉', '网络信号差、发不了动态'],
                mapping: ['曹国舅', '钟离权', '蓝采和', '韩湘子']
            },
            {
                id: 8,
                text: '旅行的意义，你认为是？',
                options: ['看更大的世界，成为更好的自己', '放松心情，暂时逃离日常生活', '体验不同文化，增长见识', '和家人朋友创造共同回忆'],
                mapping: ['吕洞宾', '蓝采和', '何仙姑', '张果老']
            }
        ];

        // ========== 2. DOM元素获取 ==========
        const welcomeEl = document.getElementById('welcome');
        const startBtn = document.getElementById('startBtn');
        const quizAreaEl = document.getElementById('quizArea');
        const questionContainer = document.getElementById('questionContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const resultAreaEl = document.getElementById('resultArea');
        const resultContent = document.getElementById('resultContent');
        const resetBtn = document.getElementById('resetBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const resetOptionBtn = document.getElementById('resetOptionBtn');
        const posterBtn = document.getElementById('posterBtn');
        const posterModal = document.getElementById('posterModal');
        const posterImg = document.getElementById('posterImg');
        const posterClose = document.getElementById('posterClose');
        const mainContainer = document.getElementById('mainContainer');

        // ========== 3. 全局状态 ==========
        let currentIndex = 0;
        const answers = new Array(QUESTIONS.length).fill(null);
        let currentResult = '';

        // ========== 4. 核心答题逻辑 ==========
        function renderQuestion(index) {
            const q = QUESTIONS[index];
            questionContainer.innerHTML = '';

            const card = document.createElement('div');
            card.className = 'question-card active';

            const header = document.createElement('div');
            header.className = 'q-header';
            header.innerHTML = `<span class="q-number">第 ${index + 1} 题</span><span>共 ${QUESTIONS.length} 题</span>`;

            const text = document.createElement('div');
            text.className = 'q-text';
            text.textContent = q.text;

            const optionsBox = document.createElement('div');
            optionsBox.className = 'options';

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-item';
                btn.textContent = opt;
                if (answers[index] === q.mapping[i]) {
                    btn.classList.add('selected');
                }
                btn.addEventListener('click', () => {
                    answers[index] = q.mapping[i];
                    optionsBox.querySelectorAll('.option-item').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                });
                optionsBox.appendChild(btn);
            });

            card.appendChild(header);
            card.appendChild(text);
            card.appendChild(optionsBox);
            questionContainer.appendChild(card);

            const progress = ((index + 1) / QUESTIONS.length) * 100;
            progressFill.style.width = progress + '%';
            progressText.textContent = `${index + 1} / ${QUESTIONS.length}`;

            updateActionButtons();
        }

        function updateActionButtons() {
            prevBtn.disabled = currentIndex === 0;

            if (currentIndex === QUESTIONS.length - 1) {
                nextBtn.textContent = '查看结果';
            } else {
                nextBtn.textContent = '下一题';
            }
        }

        function resetCurrentOption() {
            answers[currentIndex] = null;
            const optionBtns = questionContainer.querySelectorAll('.option-item');
            optionBtns.forEach(b => b.classList.remove('selected'));
        }

        // ========== 5. 结果计算与渲染 ==========
        function computeResult() {
            const voteMap = {};
            answers.forEach(name => {
                if (name) voteMap[name] = (voteMap[name] || 0) + 1;
            });

            let maxName = '吕洞宾';
            let maxCount = 0;
            for (const [name, count] of Object.entries(voteMap)) {
                if (count > maxCount) {
                    maxCount = count;
                    maxName = name;
                }
            }
            return maxName;
        }

        function showResult() {
            const unanswered = answers.filter(a => a === null).length;
            if (unanswered > 0) {
                alert(`还有 ${unanswered} 道题未作答，请完成全部题目后查看结果～`);
                return;
            }

            const resultName = computeResult();
            currentResult = resultName;
            const data = IMMORTALS[resultName];

            resultContent.innerHTML = '';

            const card = document.createElement('div');
            card.className = 'result-card';

            const mainTitle = document.createElement('div');
            mainTitle.className = 'result-main-title';
            mainTitle.textContent = '你是哪路神仙？';

            const subTitle = document.createElement('div');
            subTitle.className = 'result-sub-title';
            subTitle.textContent = '好客山东・《八仙！》版';

            const avatarBox = document.createElement('div');
            avatarBox.className = 'avatar';
            const avatarImg = document.createElement('img');
            avatarImg.src = data.image.trim();
            avatarImg.alt = data.name;
            avatarBox.appendChild(avatarImg);

            const nameEl = document.createElement('div');
            nameEl.className = 'result-name';
            nameEl.textContent = data.name;

            const typeEl = document.createElement('div');
            typeEl.className = 'result-type';
            typeEl.textContent = data.type;

            const descEl = document.createElement('div');
            descEl.className = 'result-desc';
            descEl.textContent = data.desc;

            const routeEl = document.createElement('div');
            routeEl.className = 'route-preview';
            routeEl.innerHTML = `<strong>✦ 专属旅行路线</strong>${data.route.replace(/\n/g, '<br/>')}`;

            const tipEl = document.createElement('div');
            tipEl.className = 'tip-box';
            tipEl.innerHTML = `<strong>✦ 专属旅行体验</strong>${data.tip}`;

            card.appendChild(mainTitle);
            card.appendChild(subTitle);
            card.appendChild(avatarBox);
            card.appendChild(nameEl);
            card.appendChild(typeEl);
            card.appendChild(descEl);
            card.appendChild(routeEl);
            card.appendChild(tipEl);

            resultContent.appendChild(card);

            quizAreaEl.style.display = 'none';
            resultAreaEl.classList.add('show');
            resultAreaEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // ========== 6. 生成分享海报（纯文字版，零图片依赖） ==========
        function generatePoster() {
            // 重置按钮状态
            posterBtn.textContent = '生成中...';
            posterBtn.disabled = true;

            const data = IMMORTALS[currentResult];
            if (!data) {
                posterBtn.textContent = '生成分享海报';
                posterBtn.disabled = false;
                return;
            }

            // 画布配置
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const W = 600;
            const H = 900;
            canvas.width = W;
            canvas.height = H;

            // ---------- 1. 背景与顶部装饰 ----------
            const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
            bgGrad.addColorStop(0, '#FBF7F0');
            bgGrad.addColorStop(1, '#F0E9DD');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, W, H);

            // 顶部渐变条
            const topGrad = ctx.createLinearGradient(0, 0, W, 0);
            topGrad.addColorStop(0, '#2C5F8A');
            topGrad.addColorStop(0.5, '#C8A972');
            topGrad.addColorStop(1, '#2C5F8A');
            ctx.fillStyle = topGrad;
            ctx.fillRect(0, 0, W, 10);

            // ---------- 2. 主标题区域 ----------
            ctx.fillStyle = '#2C5F8A';
            ctx.font = 'bold 34px "STSong","SimSun","PingFang SC","Microsoft YaHei",serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('《八仙！》・旅行人格测试', W / 2, 45);

            ctx.fillStyle = '#9099A6';
            ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
            ctx.fillText('好客山东 出品', W / 2, 90);

            // 金色分隔线
            ctx.strokeStyle = 'rgba(200, 169, 114, 0.4)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(W / 2 - 45, 120);
            ctx.lineTo(W / 2 + 45, 120);
            ctx.stroke();

            // ---------- 3. 结果主视觉（纯文字） ----------
            ctx.fillStyle = '#2C5F8A';
            ctx.font = 'bold 26px "STSong","SimSun",serif';
            ctx.fillText('你是哪路神仙？', W / 2, 155);

            ctx.fillStyle = '#646E7D';
            ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
            ctx.fillText('好客山东・《八仙！》版', W / 2, 192);

            // 仙人名（放大突出）
            ctx.fillStyle = '#2C5F8A';
            ctx.font = 'bold 52px "STSong","SimSun",serif';
            ctx.fillText(data.name, W / 2, 240);

            // 人格标签
            const tagText = data.type;
            ctx.font = '15px "PingFang SC","Microsoft YaHei",sans-serif';
            const tagWidth = ctx.measureText(tagText).width + 44;
            const tagX = W / 2 - tagWidth / 2;
            const tagY = 310;
            ctx.fillStyle = 'rgba(200, 169, 114, 0.15)';
            roundRect(ctx, tagX, tagY, tagWidth, 30, 15);
            ctx.fill();
            ctx.fillStyle = '#B88943';
            ctx.textBaseline = 'middle';
            ctx.fillText(tagText, W / 2, tagY + 15);

            // ---------- 4. 人物描述 ----------
            const descY = tagY + 55;
            ctx.fillStyle = '#3A3F48';
            ctx.font = '15px "PingFang SC","Microsoft YaHei",sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            wrapText(ctx, data.desc, 60, descY, W - 120, 26);

            // ---------- 5. 专属旅行路线卡片 ----------
            const routeTitleY = descY + 100;
            ctx.fillStyle = '#2C5F8A';
            ctx.font = 'bold 16px "PingFang SC","Microsoft YaHei",sans-serif';
            ctx.fillText('✦ 专属旅行路线', 60, routeTitleY);

            const routeBgY = routeTitleY + 32;
            ctx.fillStyle = '#ffffff';
            roundRect(ctx, 50, routeBgY, W - 100, 130, 14);
            ctx.fill();
            ctx.strokeStyle = 'rgba(44, 95, 138, 0.08)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.fillStyle = '#3A3F48';
            ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
            wrapText(ctx, data.route, 72, routeBgY + 18, W - 144, 24);

            // ---------- 6. 专属旅行体验卡片 ----------
            const tipTitleY = routeBgY + 150;
            ctx.fillStyle = '#2C5F8A';
            ctx.font = 'bold 16px "PingFang SC","Microsoft YaHei",sans-serif';
            ctx.fillText('✦ 专属旅行体验', 60, tipTitleY);

            const tipBgY = tipTitleY + 32;
            ctx.fillStyle = '#ffffff';
            roundRect(ctx, 50, tipBgY, W - 100, 130, 14);
            ctx.fill();
            ctx.strokeStyle = 'rgba(200, 169, 114, 0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.fillStyle = '#3A3F48';
            ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
            wrapText(ctx, data.tip, 72, tipBgY + 18, W - 144, 24);

            // ---------- 7. 底部文案 ----------
            ctx.fillStyle = '#9099A6';
            ctx.font = '12px "PingFang SC","Microsoft YaHei",sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('🎋 心随仙动 · 游在齐鲁', W / 2, H - 45);

            // 输出海报
            posterImg.src = canvas.toDataURL('image/png');
            posterModal.classList.add('show');

            // 恢复按钮
            posterBtn.textContent = '生成分享海报';
            posterBtn.disabled = false;
        }

        // ========== 工具函数：圆角矩形 ==========
        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // ========== 工具函数：文字自动换行 ==========
        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            const lines = text.split('\n');
            let cursorY = y;
            lines.forEach(line => {
                let currentLine = '';
                const chars = line.split('');
                for (let i = 0; i < chars.length; i++) {
                    const testLine = currentLine + chars[i];
                    if (ctx.measureText(testLine).width > maxWidth && i > 0) {
                        ctx.fillText(currentLine, x, cursorY);
                        currentLine = chars[i];
                        cursorY += lineHeight;
                    } else {
                        currentLine = testLine;
                    }
                }
                ctx.fillText(currentLine, x, cursorY);
                cursorY += lineHeight;
            });
        }

        // ========== 7. 重置测试 ==========
        function resetTest() {
            answers.fill(null);
            currentIndex = 0;
            currentResult = '';
            resultAreaEl.classList.remove('show');
            resultContent.innerHTML = '';
            quizAreaEl.style.display = 'none';
            welcomeEl.style.display = 'block';
            progressFill.style.width = '0%';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ========== 8. 事件绑定 ==========
        startBtn.addEventListener('click', () => {
            welcomeEl.style.display = 'none';
            quizAreaEl.style.display = 'block';
            renderQuestion(0);
        });

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion(currentIndex);
            }
        });

        resetOptionBtn.addEventListener('click', resetCurrentOption);

        nextBtn.addEventListener('click', () => {
            if (currentIndex < QUESTIONS.length - 1) {
                if (!answers[currentIndex]) {
                    alert('请先选择一个选项再继续～');
                    return;
                }
                currentIndex++;
                renderQuestion(currentIndex);
            } else {
                showResult();
            }
        });

        resetBtn.addEventListener('click', resetTest);
        posterBtn.addEventListener('click', generatePoster);

        posterClose.addEventListener('click', () => {
            posterModal.classList.remove('show');
        });

        posterModal.addEventListener('click', (e) => {
            if (e.target === posterModal) {
                posterModal.classList.remove('show');
            }
        });
    </script>
